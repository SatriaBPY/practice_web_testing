name: Playwright Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      ENV:
        description: 'Environment (QA / STAGING)'
        required: true
        type: choice
        options:
          - QA
          - STAGING
        default: 'STAGING'
      
      TEST_TYPE:
        description: 'Test type'
        required: true
        type: choice
        options:
          - smoke
          - regression
          - flaky
          - serial
          - test2
          - e2e
        default: 'smoke'
      
      WORKERS:
        description: 'Number of workers'
        required: false
        type: string
        default: '4'
      
      HEADED:
        description: 'Run with headed mode'
        required: false
        type: boolean
        default: false
      
      DEBUG:
        description: 'Run with debug mode'
        required: false
        type: boolean
        default: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Create debug folders
        run: |
          mkdir -p playwright-report
          mkdir -p test-results
          mkdir -p debug

      - name: Run Playwright tests
        env:
          # QA Secrets
          QA_ADMIN_EMAIL_PRACTICE: ${{ secrets.QA_ADMIN_EMAIL_PRACTICE }}
          QA_ADMIN_PASSWORD_PRACTICE: ${{ secrets.QA_ADMIN_PASSWORD_PRACTICE }}
          QA_VALID_LOGIN: ${{ secrets.QA_VALID_LOGIN }}
          QA_VALID_PASSWORD: ${{ secrets.QA_VALID_PASSWORD }}
          QA_DISABLE_EMAIL: ${{ secrets.QA_DISABLE_EMAIL }}
          QA_DISABLE_PASSWORD: ${{ secrets.QA_DISABLE_PASSWORD }}
          QA_DEFAULT_USER: ${{ secrets.QA_DEFAULT_USER }}
          QA_DEFAULT_PASSWORD: ${{ secrets.QA_DEFAULT_PASSWORD }}
          
          # STAGING Secrets (kalau ada)
          STAGING_VALID_LOGIN: ${{ secrets.STAGING_VALID_LOGIN }}
          STAGING_VALID_PASSWORD: ${{ secrets.STAGING_VALID_PASSWORD }}
          
          # Parameter dari workflow_dispatch
          ENV: ${{ github.event.inputs.ENV }}
          TEST_TYPE: ${{ github.event.inputs.TEST_TYPE }}
          WORKERS: ${{ github.event.inputs.WORKERS }}
          HEADED: ${{ github.event.inputs.HEADED }}
          DEBUG: ${{ github.event.inputs.DEBUG }}
      
        shell: powershell
        run: |
          Write-Host "=============================="
          Write-Host "Environment: $env:ENV"
          Write-Host "Test Type: @$env:TEST_TYPE"
          Write-Host "Workers: $env:WORKERS"
          Write-Host "Headed: $env:HEADED"
          Write-Host "Debug: $env:DEBUG"
          Write-Host "=============================="
          
          # Build script name berdasarkan parameter
          $scriptName = "$($env:ENV):$($env:TEST_TYPE)"
          
          # Tambahkan parameter tambahan jika needed
          $extraParams = ""
          
          if ($env:HEADED -eq "true") {
            $extraParams = "$extraParams --headed"
          }
          
          if ($env:DEBUG -eq "true") {
            $extraParams = "$extraParams --debug"
          }
          
          if ($env:WORKERS -ne "4") {
            $extraParams = "$extraParams --workers=$($env:WORKERS)"
          }
          
          Write-Host "Running: npm run $scriptName $extraParams"
          
          # Jalankan npm script
          npm run $scriptName -- $extraParams


      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: allure-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: allure-results/
      
      - name: Test status
        if: always()
        shell: powershell
        run: |
          if (Test-Path "allure-results") {
            $files = Get-ChildItem -Path "allure-results" -File
            if ($files.Count -gt 0) {
              Write-Host "✅ Tests completed with results"
            } else {
              Write-Host "⚠️ No test results found (folder exists but empty)"
            }
          } else {
            Write-Host "⚠️ No test results found (folder missing)"
          }